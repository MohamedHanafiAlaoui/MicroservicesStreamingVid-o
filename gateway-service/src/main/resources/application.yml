server:
  port: 8080

spring:
  application:
    name: gateway-service
  config:
    import: optional:configserver:http://config-service:8888
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
      routes:
        - id: video-service
          uri: http://video-service:8081
          predicates:
            - Path=/api/videos,/api/videos/**
        - id: user-service
          uri: http://user-service:8082
          predicates:
            - Path=/api/users,/api/users/**,/api/watchlist,/api/watchlist/**,/api/history,/api/history/**

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: gateway-service
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
