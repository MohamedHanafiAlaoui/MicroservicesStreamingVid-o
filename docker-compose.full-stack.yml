version: '3.8'

services:
  # Database
  mysql:
    image: mysql:8.0
    container_name: streaming-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: streaming_db
      MYSQL_USER: streaming_user
      MYSQL_PASSWORD: streaming_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - streaming-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend Services
  config-service:
    build: ./config-service
    container_name: config-service
    ports:
      - "8888:8888"
    volumes:
      - ./config-repo:/config-repo
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - streaming-network
    environment:
      SPRING_PROFILES_ACTIVE: mysql

  discovery-service:
    build: ./discovery-service
    container_name: discovery-service
    ports:
      - "8761:8761"
    depends_on:
      config-service:
        condition: service_started
    networks:
      - streaming-network
    environment:
      SPRING_PROFILES_ACTIVE: mysql

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      config-service:
        condition: service_started
    networks:
      - streaming-network
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/user_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: user_user
      SPRING_DATASOURCE_PASSWORD: user_password
      SPRING_CLOUD_CONFIG_ENABLED: false
      JWT_SECRET: mySecretKeyForJWTTokenGenerationAndValidation
      JWT_EXPIRATION: 86400

  video-service:
    build: ./video-service
    container_name: video-service
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      config-service:
        condition: service_started
    networks:
      - streaming-network
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/video_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: video_user
      SPRING_DATASOURCE_PASSWORD: video_password
      SPRING_CLOUD_CONFIG_ENABLED: false
      JWT_SECRET: mySecretKeyForJWTTokenGenerationAndValidation
      JWT_EXPIRATION: 86400

  gateway-service:
    build: ./gateway-service
    container_name: gateway-service
    ports:
      - "8080:8080"
    depends_on:
      discovery-service:
        condition: service_started
      user-service:
        condition: service_started
      video-service:
        condition: service_started
    networks:
      - streaming-network
    environment:
      SPRING_PROFILES_ACTIVE: mysql

  # Frontend
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      gateway-service:
        condition: service_started
    networks:
      - streaming-network
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  mysql_data:

networks:
  streaming-network:
    driver: bridge
