services:
  mysql:
    image: mysql:8.0
    container_name: streaming-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: streaming_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - streaming-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  config-service:
    build: ./config-service
    container_name: config-service
    ports:
      - "8888:8888"
    volumes:
      - ./config-repo:/config-repo
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      SPRING_CLOUD_CONFIG_SERVER_GIT_URI: file:///config-repo
    networks:
      - streaming-network

  discovery-service:
    build: ./discovery-service
    container_name: discovery-service
    ports:
      - "8761:8761"
    networks:
      - streaming-network

  video-service:
    build: ./video-service
    container_name: video-service
    ports:
      - "8081:8081"
    depends_on:
      config-service:
        condition: service_started
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/video_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: video_user
      SPRING_DATASOURCE_PASSWORD: video_password
      SPRING_CLOUD_CONFIG_ENABLED: false
      JWT_SECRET: mySecretKeyForJWTTokenGenerationAndValidation
      JWT_EXPIRATION: 86400
    networks:
      - streaming-network

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/user_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: user_user
      SPRING_DATASOURCE_PASSWORD: user_password
      SPRING_CLOUD_CONFIG_ENABLED: false
      JWT_SECRET: mySecretKeyForJWTTokenGenerationAndValidation
      JWT_EXPIRATION: 86400
    networks:
      - streaming-network

  gateway-service:
    build: ./gateway-service
    container_name: gateway-service
    ports:
      - "8080:8080"
    depends_on:
      discovery-service:
        condition: service_started
      video-service:
        condition: service_started
      user-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: mysql
    networks:
      - streaming-network

volumes:
  mysql_data:

networks:
  streaming-network:
    driver: bridge
