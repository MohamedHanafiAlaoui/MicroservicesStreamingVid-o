version: '3.8'

services:
  config-service:
    build: ./config-service
    ports:
      - "8888:8888"
    volumes:
      - ./config-repo:/config-repo
    environment:
      - SPRING_CLOUD_CONFIG_SERVER_GIT_URI=file:///config-repo
    networks:
      - streaming-network

  discovery-service:
    build: ./discovery-service
    ports:
      - "8761:8761"
    depends_on:
      - config-service
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
    networks:
      - streaming-network

  video-service:
    build: ./video-service
    ports:
      - "8081:8081"
    depends_on:
      - config-service
      - discovery-service
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_CLOUD_CONFIG_URI=http://config-service:8888
    networks:
      - streaming-network

  user-service:
    build: ./user-service
    ports:
      - "8082:8082"
    depends_on:
      - config-service
      - discovery-service
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_CLOUD_CONFIG_URI=http://config-service:8888
    networks:
      - streaming-network

  gateway-service:
    build: ./gateway-service
    ports:
      - "8080:8080"
    depends_on:
      - config-service
      - discovery-service
      - video-service
      - user-service
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_CLOUD_CONFIG_URI=http://config-service:8888
    networks:
      - streaming-network

networks:
  streaming-network:
    driver: bridge
